<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>RUNECODE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; overflow: hidden; }
    canvas { display: block; max-width: 100vw; }
  </style>
</head>
<body>
<script>
async function selectSecretKey() {
  return new Promise((resolve) => {
    const input = document.createElement("input");
    input.type = "file";
    input.onchange = (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (event) => resolve(event.target.result);
      reader.readAsText(file);
    };
    input.click();
  });
}

function saveLogToObsidian(vaultName, fileName, logContent) {
  const encoded = encodeURIComponent(logContent);
  const uri = `obsidian://append?vault=${vaultName}&file=${fileName}&content=${encoded}`;
  window.location.href = uri;
}

function setCanvasScale(scale) {
  const canvas = document.querySelector("canvas");
  if (canvas) {
    canvas.style.transform = `scale(${scale})`;
    canvas.style.transformOrigin = "top left";
    console.log(`[Bridge] Canvas scaled to ${scale}`);
  }
}

let wsConnection = null;
let PROXY_CONFIG = {
  host: "localhost",
  port: 8888,
  secure: false
};

// Initialize proxy config from user input
function updateProxyConfig() {
  const hostInput = document.getElementById("proxyHost");
  const portInput = document.getElementById("proxyPort");
  
  if (hostInput && portInput) {
    PROXY_CONFIG.host = hostInput.value || "localhost";
    PROXY_CONFIG.port = parseInt(portInput.value) || 8888;
    PROXY_CONFIG.secure = window.location.protocol === "https:";
    console.log(`[Bridge] Updated proxy config:`, PROXY_CONFIG);
  }
}

function sshConnect(server, user, password) {
  updateProxyConfig();
  console.log(`SSH Request: ${user}@${server}`);
  
  if (!wsConnection) {
    const protocol = PROXY_CONFIG.secure ? "wss" : "ws";
    const wsUrl = `${protocol}://${PROXY_CONFIG.host}:${PROXY_CONFIG.port}`;
    
    console.log(`[Bridge] Connecting to proxy: ${wsUrl}`);
    wsConnection = new WebSocket(wsUrl);

    wsConnection.onopen = () => {
      console.log("[Bridge] Connected to proxy server");
      wsConnection.send(
        JSON.stringify({
          type: "INIT",
          host: server,
          port: 22,
          user: user,
          pass: password
        })
      );
    };

    wsConnection.onmessage = (event) => {
      try {
        const msg = JSON.parse(event.data);
        if (msg.type === "CONNECTED") {
          console.log("[Bridge] SSH tunnel established");
          if (window.pyxelApp) {
            window.pyxelApp.log_lines.push("> SSH TUNNEL READY");
          }
        } else if (msg.type === "DATA") {
          const text = atob(msg.payload);
          if (window.pyxelApp) {
            window.pyxelApp.log_lines.push(text.split("\n")[0]);
          }
        } else if (msg.type === "ERROR") {
          if (window.pyxelApp) {
            window.pyxelApp.log_lines.push(`> ERROR: ${msg.message}`);
          }
        }
      } catch (e) {
        console.error("[Bridge] Message error:", e);
      }
    };

    wsConnection.onerror = (err) => {
      console.error("[Bridge] WebSocket error:", err);
      if (window.pyxelApp) {
        window.pyxelApp.log_lines.push("> CONNECTION ERROR");
      }
    };

    wsConnection.onclose = () => {
      console.log("[Bridge] Proxy connection closed");
      wsConnection = null;
    };
  }
}

let lastShakeTime = 0;
let isSensorActivated = false;

async function activateSensors() {
  if (isSensorActivated) return;
  if (typeof DeviceMotionEvent.requestPermission === "function") {
    const permission = await DeviceMotionEvent.requestPermission();
    if (permission === "granted") {
      window.addEventListener("devicemotion", handleMotion, false);
      isSensorActivated = true;
    }
  } else {
    window.addEventListener("devicemotion", handleMotion, false);
    isSensorActivated = true;
  }
}

function handleMotion(event) {
  const acc = event.accelerationIncludingGravity;
  if (!acc) return;
  const total = Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z);
  if (total > 30) {
    const now = Date.now();
    if (now - lastShakeTime > 1000) {
      lastShakeTime = now;
      if (window.navigator.vibrate) window.navigator.vibrate(200);
      if (window.pyxelApp && window.pyxelApp.change_theme) {
        window.pyxelApp.change_theme();
      }
    }
  }
}

// iPhone keyboard input support
let keyboardInput = null;

function setupKeyboardInput() {
  const input = document.createElement("input");
  input.id = "hidden-keyboard-input";
  input.type = "text";
  // Must be in viewport with opacity:0 — iOS ignores focus() on off-screen elements
  input.style.cssText = "position:fixed;left:0;top:0;width:100%;height:1px;opacity:0;border:none;outline:none;padding:0;margin:0;font-size:16px;";
  input.setAttribute("autocomplete", "off");
  input.setAttribute("autocorrect", "off");
  input.setAttribute("autocapitalize", "off");
  input.setAttribute("spellcheck", "false");
  input.setAttribute("inputmode", "text");
  document.body.appendChild(input);
  keyboardInput = input;

  input.addEventListener("input", (e) => {
    const val = e.target.value;
    if (val && window.pyxelApp && window.pyxelApp.input_buffer !== undefined) {
      window.pyxelApp.input_buffer += val;
      input.value = "";
    }
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Backspace") {
      if (window.pyxelApp && window.pyxelApp.input_buffer !== undefined) {
        window.pyxelApp.input_buffer = window.pyxelApp.input_buffer.slice(0, -1);
      }
      e.preventDefault();
    } else if (e.key === "Enter") {
      if (window.pyxelApp) {
        window.pyxelApp.submit_input();
      }
      e.preventDefault();
    }
  });

  // iOS Safari: focus() MUST be called synchronously inside a touch event.
  // Attach to canvas touchstart so tapping during input mode opens keyboard immediately.
  function attachCanvasListener() {
    const canvas = document.querySelector("canvas");
    if (canvas) {
      canvas.addEventListener("touchstart", () => {
        if (window.pyxelApp && window.pyxelApp.input_step > 0) {
          input.focus();
        }
      }, { passive: true });
      console.log("[Bridge] Canvas touch listener attached for keyboard");
    } else {
      setTimeout(attachCanvasListener, 500);
    }
  }
  attachCanvasListener();
}

function showKeyboard() {
  if (keyboardInput) {
    keyboardInput.focus();
  }
}

function hideKeyboard() {
  if (keyboardInput) {
    keyboardInput.blur();
  }
}

</script>
